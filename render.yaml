services:
  - type: web
    name: apexnode-ai
    runtime: python
    plan: free
    # Models are pre-trained and committed under checkpoints/ — do NOT retrain on deploy.
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn serve:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
